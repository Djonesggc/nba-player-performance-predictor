<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA Player Performance Predictor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🏀 NBA Performance Predictor</h1>
<p>Predict a player's Points, Rebounds, and Assists</p>

<div class="form">

<input id="player" type="text" placeholder="Player Name">

<input id="opponent" type="text" placeholder="Opponent Team">

<select id="location">
<option value="">Game Location</option>
<option value="home">Home</option>
<option value="away">Away</option>
</select>

<input id="avgPoints" type="number" placeholder="Avg Points Last 5 Games">

<input id="minutes" type="number" placeholder="Expected Minutes">

<button onclick="predict()">Predict Performance</button>

</div>

<div class="results">

<h2>Predicted Stats</h2>

<p>Points: <span id="points">--</span></p>
<p>Rebounds: <span id="rebounds">--</span></p>
<p>Assists: <span id="assists">--</span></p>
<p>Total PRA: <span id="pra">--</span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
